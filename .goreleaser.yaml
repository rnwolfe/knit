version: 2

project_name: knit

before:
  hooks:
    - go mod tidy

builds:
  - id: knit
    main: ./cmd/knit
    binary: knit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/rnwolfe/knit/internal/version.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: knit
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

homebrew_casks:
  - repository:
      owner: rnwolfe
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TOKEN }}"
    homepage: "https://github.com/rnwolfe/knit"
    description: "Agent-friendly CLI for Instagram's Threads — read-only by default."
    # Unsigned binaries get Gatekeeper-quarantined; strip the attribute on install.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/knit"]
          end

release:
  draft: false

changelog:
  use: github
  sort: asc
