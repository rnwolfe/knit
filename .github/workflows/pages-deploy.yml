name: docs

on:
  push:
    branches: [main]
    paths: [docs/**, .github/workflows/pages-deploy.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # lastUpdated git dates
      - uses: withastro/action@v3
        with:
          path: docs
          node-version: 22
          package-manager: pnpm@10.27.0
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
