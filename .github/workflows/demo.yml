name: demo

# Regenerate the README demo GIF from demo/knit.tape so it never drifts.
on:
  push:
    branches: [main]
    paths: [demo/knit.tape, cmd/**, internal/**]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install knit on PATH (tape uses bare `knit`)
        run: go install ./cmd/knit
      - name: Ensure deps on PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: charmbracelet/vhs-action@v2
        with:
          path: demo/knit.tape
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(demo): regenerate knit.gif [skip ci]"
          file_pattern: demo/knit.gif
