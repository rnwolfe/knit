name: Feature request
description: Suggest a command, flag, or behavior.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Who is it for (human or agent)?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Command/flag shape. Remember the contract (read-only default, stable JSON).
    validations: { required: true }
